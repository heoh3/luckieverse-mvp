<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luckieverse Admin - 리워드 게임 관리</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f6fa;color:#2d3436;}
.layout{display:flex;min-height:100vh;}

/* Sidebar */
.sidebar{width:240px;background:#fff;border-right:1px solid #e9ecef;flex-shrink:0;position:fixed;top:0;left:0;height:100vh;overflow-y:auto;z-index:50;}
.sidebar-logo{padding:20px 20px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #e9ecef;}
.sidebar-logo svg{flex-shrink:0;}
.sidebar-logo-text{font-size:16px;font-weight:800;color:#3b5bdb;letter-spacing:-0.5px;}
.menu-group{padding:12px 0 4px;}
.menu-group-title{padding:0 20px;font-size:11px;font-weight:700;color:#adb5bd;margin-bottom:6px;letter-spacing:0.5px;}
.menu-item{display:flex;align-items:center;gap:10px;padding:9px 20px;cursor:pointer;font-size:13px;color:#495057;transition:all .15s;position:relative;}
.menu-item:hover{background:#f1f3f5;color:#212529;}
.menu-item.active{background:#edf2ff;color:#3b5bdb;font-weight:600;}
.menu-item.active::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:#3b5bdb;border-radius:0 2px 2px 0;}
.menu-item .mi-icon{width:18px;text-align:center;font-size:14px;flex-shrink:0;}
.menu-item .mi-badge{margin-left:auto;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;background:#fff3bf;color:#e67700;}
.menu-item.disabled{color:#ced4da;pointer-events:none;}

/* Main */
.main{margin-left:240px;padding:24px 28px;flex:1;}
.page-header{margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;}
.page-header h1{font-size:20px;font-weight:800;}
.btn{padding:9px 18px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;}
.btn:active{transform:scale(.97);}
.btn-primary{background:#3b5bdb;color:#fff;}.btn-primary:hover{background:#364fc7;}

/* Stats */
.stats{display:flex;gap:14px;margin-bottom:20px;}
.stat-card{flex:1;background:#fff;border-radius:10px;padding:16px;border:1px solid #e9ecef;}
.stat-label{font-size:11px;color:#868e96;margin-bottom:2px;}
.stat-value{font-size:24px;font-weight:800;color:#212529;}
.stat-sub{font-size:11px;color:#adb5bd;margin-top:2px;}

/* Table */
.table-wrap{background:#fff;border-radius:10px;border:1px solid #e9ecef;overflow:hidden;}
table{width:100%;border-collapse:collapse;}
thead{background:#f8f9fa;}
th{padding:12px 16px;text-align:left;font-size:11px;color:#868e96;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;}
td{padding:12px 16px;font-size:13px;border-top:1px solid #f1f3f5;}
tr:hover{background:#f8f9fa;cursor:pointer;}
.game-name{font-weight:600;color:#3b5bdb;}
.badge{display:inline-block;padding:3px 10px;border-radius:10px;font-size:10px;font-weight:600;}
.badge-on{background:#d3f9d8;color:#2b8a3e;}
.badge-off{background:#f1f3f5;color:#868e96;}
.toggle-sm{position:relative;width:36px;height:20px;cursor:pointer;display:inline-block;vertical-align:middle;}
.toggle-sm input{display:none;}
.toggle-sm .ts{position:absolute;top:0;left:0;right:0;bottom:0;background:#dee2e6;border-radius:10px;transition:.3s;}
.toggle-sm .ts:before{content:'';position:absolute;width:14px;height:14px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.3s;}
.toggle-sm input:checked+.ts{background:#51cf66;}
.toggle-sm input:checked+.ts:before{transform:translateX(16px);}
.flow-cell{font-size:11px;color:#868e96;}
.reward-cell{font-size:12px;}
.reward-cell .rc-type{color:#495057;font-weight:600;}
.reward-cell .rc-range{color:#868e96;}
</style>
</head>
<body>
<div class="layout">
<nav class="sidebar">
  <div class="sidebar-logo">
    <img src="logo.svg" alt="LUCKIEVERSE" style="width:160px;height:auto;">
  </div>
  <div class="menu-group"><div class="menu-group-title">Dashboard</div>
    <div class="menu-item disabled"><span class="mi-icon">📊</span>콘텐츠 성과<span class="mi-badge">서비스 준비중</span></div>
  </div>
  <div class="menu-group"><div class="menu-group-title">회원 관리</div>
    <div class="menu-item disabled"><span class="mi-icon">👤</span>Master 계정 관리</div>
    <div class="menu-item disabled"><span class="mi-icon">👥</span>파트너사 계정 관리</div>
    <div class="menu-item disabled"><span class="mi-icon">🧑</span>앱 유저 관리</div>
  </div>
  <div class="menu-group"><div class="menu-group-title">비즈니스/앱 관리</div>
    <div class="menu-item disabled"><span class="mi-icon">📁</span>비즈니스</div>
    <div class="menu-item disabled"><span class="mi-icon">📱</span>앱</div>
  </div>
  <div class="menu-group"><div class="menu-group-title">서비스 운영</div>
    <div class="menu-item disabled"><span class="mi-icon">📋</span>콘텐츠 관리</div>
    <div class="menu-item disabled"><span class="mi-icon">💰</span>포인트 수동 관리</div>
    <div class="menu-item active"><span class="mi-icon">🎮</span>리워드 게임 관리</div>
    <div class="menu-item disabled"><span class="mi-icon">❓</span>FAQ 관리</div>
    <div class="menu-item disabled"><span class="mi-icon">🔧</span>서비스 긴급 점검</div>
  </div>
  <div class="menu-group"><div class="menu-group-title">약관 및 정책</div>
    <div class="menu-item disabled"><span class="mi-icon">📜</span>이용약관</div>
    <div class="menu-item disabled"><span class="mi-icon">🔒</span>개인정보 처리 방침</div>
  </div>
  <div class="menu-group"><div class="menu-group-title">문의 관리</div>
    <div class="menu-item disabled"><span class="mi-icon">💬</span>앱 유저 CS 관리</div>
  </div>
</nav>

<div class="main">
  <div class="page-header">
    <h1>리워드 게임 관리</h1>
    <button class="btn btn-primary" onclick="addGame()">+ 게임 등록</button>
  </div>

  <div class="stats">
    <div class="stat-card"><div class="stat-label">등록된 게임</div><div class="stat-value" id="statTotal">0</div></div>
    <div class="stat-card"><div class="stat-label">활성 게임</div><div class="stat-value" id="statActive">0</div><div class="stat-sub">ON 상태</div></div>
    <div class="stat-card"><div class="stat-label">오늘 총 플레이</div><div class="stat-value" id="statPlays">—</div><div class="stat-sub">서비스 준비중</div></div>
    <div class="stat-card"><div class="stat-label">오늘 포인트 지급</div><div class="stat-value" id="statPts">—</div><div class="stat-sub">서비스 준비중</div></div>
  </div>

  <div class="table-wrap">
    <table>
      <thead><tr><th>게임명</th><th>콘텐츠</th><th>상태</th><th>클리어 조건</th><th>보상</th><th>리워드 프리퀀시</th><th>프리 플레이</th></tr></thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
</div>
</div>

<script>
const STORAGE='luckieverse_games';
function loadGames(){return JSON.parse(localStorage.getItem(STORAGE)||'[]');}
function saveGames(g){localStorage.setItem(STORAGE,JSON.stringify(g));}

function initSampleData(){
  const ver='v10';
  if(localStorage.getItem('lv_admin_ver')===ver)return;
  localStorage.removeItem(STORAGE);localStorage.removeItem('luckieverse_game_config');
  localStorage.setItem('lv_admin_ver',ver);
  saveGames([
    {id:'g1',name:'두더지 테트리스',content:'games/tetris.html',active:true,clearType:'점수 도달',clearValue:3000,timeLimit:120,playDuration:120,adEntry:{on:false,required:'필수'},adReward:{on:true,required:'필수'},adUpgrade:{on:true},rewardType:'random',rewardFixedVal:3,rewardTiers:[{p:1,pct:50},{p:2,pct:35},{p:3,pct:15}],upgradeType:'random',upgradeFixedVal:6,upgradeTiers:[{p:2,pct:40},{p:4,pct:35},{p:6,pct:25}],rewardBurst:3,rewardCooldown:2,dailyRewards:5,dailyPoints:15,freePlay:true,dailyPlayLimit:0},
    {id:'g2',name:'두더지 잡기',content:'games/whack-a-mole.html',active:true,clearType:'점수 도달',clearValue:2000,timeLimit:60,playDuration:60,adEntry:{on:false,required:'필수'},adReward:{on:true,required:'필수'},adUpgrade:{on:true},rewardType:'random',rewardFixedVal:3,rewardTiers:[{p:1,pct:50},{p:2,pct:35},{p:3,pct:15}],upgradeType:'random',upgradeFixedVal:6,upgradeTiers:[{p:2,pct:40},{p:4,pct:35},{p:6,pct:25}],rewardBurst:3,rewardCooldown:2,dailyRewards:5,dailyPoints:15,freePlay:true,dailyPlayLimit:0},
  ]);
}

function contentLabel(c){return c.includes('tetris')?'테트리스 퍼즐':c.includes('balloon')?'풍선 터뜨리기':c.includes('fruit')?'과일 슬라이서':'두더지 잡기';}

function renderTable(){
  const games=loadGames();
  document.getElementById('statTotal').textContent=games.length;
  document.getElementById('statActive').textContent=games.filter(g=>g.active).length;
  const tbody=document.getElementById('tableBody');
  if(games.length===0){
    tbody.innerHTML='<tr><td colspan="7" style="text-align:center;padding:40px;color:#adb5bd;">등록된 게임이 없습니다. [+ 게임 등록] 버튼으로 추가하세요.</td></tr>';
    return;
  }
  tbody.innerHTML=games.map(g=>{
    const rType=g.rewardType==='fixed'?'직접 포인트':g.rewardType==='roulette'?'룰렛':'선물상자';
    let rRange='';
    if(g.rewardType==='fixed') rRange=g.rewardFixedVal+'P';
    else{const s=[...(g.rewardTiers||[])].sort((a,b)=>a.p-b.p);rRange=s.length?s[0].p+'~'+s[s.length-1].p+'P':'-';}
    return `<tr onclick="location.href='admin-detail.html?id=${g.id}'">
      <td class="game-name">${g.name}</td>
      <td>${contentLabel(g.content)}</td>
      <td><label class="toggle-sm" onclick="event.stopPropagation()"><input type="checkbox" ${g.active?'checked':''} onchange="toggleActive('${g.id}',this.checked)"><span class="ts"></span></label></td>
      <td class="flow-cell">${g.clearType} / ${g.clearType==='시간 경과'?(g.playDuration||120)+'초':(g.clearValue||3000).toLocaleString()+'점'}</td>
      <td class="reward-cell"><span class="rc-type">${rType}</span> <span class="rc-range">${rRange}</span></td>
      <td class="flow-cell">${g.rewardBurst||3}회 연속 / ${g.rewardCooldown||2}h 쿨다운<br>${g.dailyRewards||5}회/일, ${g.dailyPoints||15}P/일</td>
      <td><span class="badge ${g.freePlay!==false?'badge-on':'badge-off'}">${g.freePlay!==false?'ON':'OFF'}</span></td>
    </tr>`;
  }).join('');
}

function toggleActive(id,val){
  const games=loadGames();
  const g=games.find(g=>g.id===id);
  if(g){g.active=val;saveGames(games);renderTable();}
}

function addGame(){
  const games=loadGames();
  const id='g'+Date.now();
  games.push({id,name:'새 게임',content:'games/tetris.html',active:true,clearType:'점수 도달',clearValue:3000,timeLimit:30,playDuration:60,adEntry:{on:false,required:'필수'},adReward:{on:true,required:'필수'},adUpgrade:{on:true},rewardType:'random',rewardFixedVal:3,rewardTiers:[{p:1,pct:50},{p:2,pct:35},{p:3,pct:15}],upgradeType:'random',upgradeFixedVal:6,upgradeTiers:[{p:2,pct:40},{p:4,pct:35},{p:6,pct:25}],rewardBurst:3,rewardCooldown:2,dailyRewards:5,dailyPoints:15,freePlay:true,dailyPlayLimit:0});
  saveGames(games);
  location.href='admin-detail.html?id='+id;
}

initSampleData();
renderTable();
</script>
</body>
</html>
