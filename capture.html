<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Figma Capture</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:#f5f6fa;min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  padding:40px 20px;
}
.card{
  background:#fff;border-radius:16px;padding:32px;
  width:100%;max-width:480px;
  box-shadow:0 2px 20px rgba(0,0,0,0.06);
}
.card h1{font-size:20px;font-weight:800;color:#333;margin-bottom:24px;display:flex;align-items:center;gap:10px;}
.card h1 .logo{width:28px;height:28px;background:#A259FF;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;}

.field{margin-bottom:16px;}
.field label{display:block;font-size:12px;font-weight:600;color:#868e96;margin-bottom:6px;}
.field input{
  width:100%;padding:10px 14px;
  border:1px solid #dee2e6;border-radius:8px;
  font-size:14px;color:#333;background:#fff;
}
.field input:focus{outline:none;border-color:#A259FF;box-shadow:0 0 0 3px rgba(162,89,255,0.1);}
.field input::placeholder{color:#ced4da;}
.figma-info{
  margin-top:6px;font-size:12px;color:#A259FF;
  display:flex;align-items:center;gap:8px;
}
.figma-info a{color:#A259FF;text-decoration:none;font-weight:600;}
.figma-info a:hover{text-decoration:underline;}

.actions{display:flex;gap:8px;margin-top:20px;}
.btn{
  flex:1;padding:12px;border:none;border-radius:10px;
  font-size:14px;font-weight:600;cursor:pointer;
  transition:all .15s;text-align:center;
}
.btn:active{transform:scale(.97);}
.btn-capture{background:#A259FF;color:#fff;}
.btn-capture:hover{background:#9147e8;}
.btn-figma{background:#f1f3f5;color:#495057;flex:0.6;}
.btn-figma:hover{background:#e9ecef;}
.btn-figma:disabled{opacity:0.4;cursor:default;}

.steps{
  margin-top:20px;padding:16px;
  background:#faf5ff;border-radius:10px;border:1px solid #f0e6ff;
}
.steps .step{
  display:flex;align-items:flex-start;gap:10px;
  font-size:13px;color:#555;line-height:1.5;
}
.steps .step+.step{margin-top:8px;}
.steps .step .num{
  width:20px;height:20px;border-radius:6px;
  background:#A259FF;color:#fff;font-size:10px;font-weight:700;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  margin-top:1px;
}
.steps .step kbd{
  display:inline-block;padding:1px 6px;
  background:#fff;border:1px solid #dee2e6;border-radius:4px;
  font-family:monospace;font-size:11px;color:#A259FF;
}

.history{margin-top:24px;}
.history h3{font-size:12px;font-weight:600;color:#adb5bd;margin-bottom:8px;}
.history-list{display:flex;flex-direction:column;gap:4px;}
.history-item{
  display:flex;align-items:center;gap:8px;padding:8px 10px;
  background:#f8f9fa;border-radius:6px;font-size:12px;color:#495057;
  cursor:pointer;transition:background .15s;
}
.history-item:hover{background:#f1f3f5;}
.history-item .url{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.history-item .time{color:#adb5bd;font-size:11px;white-space:nowrap;}
.history-item .remove{
  color:#ced4da;cursor:pointer;font-size:14px;padding:0 4px;
}
.history-item .remove:hover{color:#fa5252;}
</style>
</head>
<body>

<div class="card">
  <h1><span class="logo">F</span> Figma Capture</h1>

  <div class="field">
    <label>PAGE URL</label>
    <input id="pageUrl" type="url" placeholder="http://localhost:3001/admin.html" />
  </div>

  <div class="field">
    <label>FIGMA FILE <span style="font-weight:400;color:#ced4da;">(optional)</span></label>
    <input id="figmaUrl" type="url" placeholder="https://www.figma.com/design/..." />
    <div class="figma-info" id="figmaInfo" style="display:none;"></div>
  </div>

  <div class="actions">
    <button class="btn btn-capture" onclick="capture()">Capture</button>
    <button class="btn btn-figma" id="openFigmaBtn" onclick="openFigma()" disabled>Figma 열기</button>
  </div>

  <div class="steps">
    <div class="step"><span class="num">1</span><span><b>Capture</b> 클릭 → 새 탭에서 페이지 열림</span></div>
    <div class="step"><span class="num">2</span><span>크롬 확장프로그램이 자동 캡처 → 클립보드 복사</span></div>
    <div class="step"><span class="num">3</span><span>Figma 파일에서 <kbd>⌘V</kbd> 붙여넣기</span></div>
  </div>

  <div class="history" id="historySection" style="display:none;">
    <h3>RECENT</h3>
    <div class="history-list" id="historyList"></div>
  </div>
</div>

<script>
const HISTORY_KEY = 'figma_capture_history';

function parseFigmaUrl(url) {
  try {
    const u = new URL(url);
    const parts = u.pathname.split('/');
    const idx = parts.indexOf('design');
    if (idx >= 0 && parts[idx + 1]) {
      const fileKey = parts[idx + 1];
      const nodeId = u.searchParams.get('node-id');
      const fileName = decodeURIComponent(parts[idx + 2] || '').replace(/-/g, ' ');
      return { fileKey, nodeId, fileName, url };
    }
    return null;
  } catch { return null; }
}

function buildCaptureUrl(pageUrl) {
  const u = new URL(pageUrl);
  // Append figmacapture query param (for extension detection)
  u.searchParams.set('figmacapture', 'true');
  // Set hash for capture.js (clipboard mode)
  return u.toString() + '#figmacapture';
}

function capture() {
  const pageUrl = document.getElementById('pageUrl').value.trim();
  if (!pageUrl) { document.getElementById('pageUrl').focus(); return; }

  try {
    const captureUrl = buildCaptureUrl(pageUrl);
    window.open(captureUrl, '_blank');
    saveHistory(pageUrl);
  } catch (e) {
    alert('유효한 URL을 입력하세요.');
  }
}

function openFigma() {
  const url = document.getElementById('figmaUrl').value.trim();
  if (url) window.open(url, '_blank');
}

function updateFigmaInfo() {
  const url = document.getElementById('figmaUrl').value.trim();
  const info = document.getElementById('figmaInfo');
  const btn = document.getElementById('openFigmaBtn');

  if (!url) {
    info.style.display = 'none';
    btn.disabled = true;
    return;
  }

  const parsed = parseFigmaUrl(url);
  if (parsed) {
    info.style.display = 'flex';
    info.innerHTML = `${parsed.fileName || parsed.fileKey}${parsed.nodeId ? ' <span style="color:#868e96">→ ' + parsed.nodeId + '</span>' : ''}`;
    btn.disabled = false;
  } else {
    info.style.display = 'none';
    btn.disabled = false; // still allow opening raw URL
  }
}

// History
function loadHistory() {
  try { return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]'); }
  catch { return []; }
}

function saveHistory(url) {
  const h = loadHistory().filter(item => item.url !== url);
  h.unshift({ url, time: Date.now() });
  if (h.length > 5) h.length = 5;
  localStorage.setItem(HISTORY_KEY, JSON.stringify(h));
  renderHistory();
}

function removeHistory(url) {
  const h = loadHistory().filter(item => item.url !== url);
  localStorage.setItem(HISTORY_KEY, JSON.stringify(h));
  renderHistory();
}

function renderHistory() {
  const h = loadHistory();
  const section = document.getElementById('historySection');
  const list = document.getElementById('historyList');

  if (h.length === 0) { section.style.display = 'none'; return; }

  section.style.display = 'block';
  list.innerHTML = h.map(item => {
    const ago = timeAgo(item.time);
    return `<div class="history-item" onclick="document.getElementById('pageUrl').value='${item.url}'">
      <span class="url">${item.url}</span>
      <span class="time">${ago}</span>
      <span class="remove" onclick="event.stopPropagation();removeHistory('${item.url}');">&times;</span>
    </div>`;
  }).join('');
}

function timeAgo(ts) {
  const s = Math.floor((Date.now() - ts) / 1000);
  if (s < 60) return '방금';
  if (s < 3600) return Math.floor(s / 60) + '분 전';
  if (s < 86400) return Math.floor(s / 3600) + '시간 전';
  return Math.floor(s / 86400) + '일 전';
}

// Events
document.getElementById('figmaUrl').addEventListener('input', updateFigmaInfo);
document.getElementById('pageUrl').addEventListener('keydown', e => { if (e.key === 'Enter') capture(); });
document.getElementById('figmaUrl').addEventListener('keydown', e => { if (e.key === 'Enter') capture(); });

// Init
renderHistory();

// Auto-fill from URL params
const params = new URLSearchParams(location.search);
if (params.get('url')) document.getElementById('pageUrl').value = params.get('url');
if (params.get('figma')) { document.getElementById('figmaUrl').value = params.get('figma'); updateFigmaInfo(); }
</script>
</body>
</html>
